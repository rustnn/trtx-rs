name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-git-

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-target-${{ matrix.rust }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-target-${{ matrix.rust }}-

      - name: Install TensorRT RTX libs via pip
        if: ${{ matrix.os != 'macos-latest' }}
        shell: bash
        run: |
          # 1.3 is not on pip, only starting with 1.4
          pip install tensorrt_rtx~=1.4
          RTX_LIB_DIR=$(python -c 'from os.path import dirname;print(dirname(__import__("tensorrt_rtx_libs").__file__))')
          echo "RTX_LIB_DIR=$RTX_LIB_DIR"
          echo "RTX_LIB_DIR=$RTX_LIB_DIR" >> $GITHUB_ENV

      # Version suffix is missing in the Linux Python installation
      - name: Massage TensorRT RTX libs name on Linux
        if: ${{ matrix.os == 'ubuntu-latest' }}
        shell: bash
        run: |
          ln -s $RTX_LIB_DIR/libtensorrt_rtx.so.1{,.4.0}
          ln -s $RTX_LIB_DIR/libtensorrt_onnxparser_rtx.so.1{,.4.0}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy (real mode)
        run: cargo clippy --all-targets -- -D warnings

      - name: Build (real mode)
        run: cargo build --verbose

      - name: Run tests (real mode with mock_runtime, Linux)
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          export LD_LIBRARY_PATH="$RTX_LIB_DIR"
          cargo test -F mock_runtime --verbose

      - name: Run tests (real mode with mock_runtime, Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        run: |
          $env:PATH+=";$env:RTX_LIB_DIR"
          echo "PATH=$PATH"
          cargo test -F mock_runtime --verbose

      - name: Run tests (mock mode old TensorRT versions)
        run: |
          cargo test -F mock -F v_1_3 -F dlopen_tensorrt_rtx -F dlopen_tensorrt_onnxparser --no-default-features --verbose
          cargo check -F v_1_3 -F dlopen_tensorrt_rtx -F dlopen_tensorrt_onnxparser --no-default-features --verbose
          # onnxparser disabled
          cargo test -F mock -F v_1_3 -F dlopen_tensorrt_rtx --no-default-features --verbose
          cargo check -F v_1_3 -F dlopen_tensorrt_rtx --no-default-features --verbose


      - name: Run clippy (mock mode)
        run: cargo clippy --features mock --all-targets -- -D warnings

      - name: Build (mock mode)
        run: cargo build --features mock --verbose

      - name: Run tests (mock mode)
        run: cargo test --features mock --verbose

      - name: Build documentation
        run: cargo doc --features mock --no-deps

      - name: Build documentation (real mode)
        run: cargo doc --no-deps

  examples:
    name: Examples
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run example
        run: cargo run --features mock --example basic_workflow

