name: Publish to crates.io

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to crates.io (true/false)'
        required: true
        default: 'false'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy -p trtx -p trtx-sys -- -D warnings

      - name: Run tests
        run: |
          cargo test -p trtx --features mock --verbose
          cargo test -p trtx-sys --features mock --verbose

      - name: Publish trtx-sys to crates.io
        if: |
          github.event_name == 'release' ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true')
        run: |
          cargo publish -p trtx-sys --token ${{ secrets.CRATES_IO_TOKEN }}
        continue-on-error: false

      - name: Wait for crates.io to index trtx-sys
        if: |
          github.event_name == 'release' ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true')
        run: sleep 60

      - name: Publish trtx to crates.io
        if: |
          github.event_name == 'release' ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true')
        run: |
          cargo publish -p trtx --token ${{ secrets.CRATES_IO_TOKEN }}
        continue-on-error: false
